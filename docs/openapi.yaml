openapi: 3.1.0
info:
  title: Kocotree Skills API
  version: 0.3.0
  description: Kocotree Skills 客户端、模拟接口与未来真实后端共同遵守的契约。
  license:
    name: Proprietary
servers:
  - url: http://localhost:3000
tags:
  - name: Users
    description: 当前用户和用户关联的 Skill。
  - name: Tags
    description: Skill 分类标签。
  - name: Skills
    description: Skill 查询、创建和生命周期管理。
  - name: Versions
    description: 不可变版本、文件树和撤回。
  - name: Ownership
    description: 所有权转移邀请。
  - name: Installations
    description: 下载凭证、安装匹配和安装上报。
  - name: Notifications
    description: 应用内弱提醒。
paths:
  /api/users/me:
    get:
      tags: [Users]
      summary: 获取当前用户
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/users/me/skills:
    get:
      tags: [Users]
      summary: 获取我的在线 Skill
      operationId: listMySkills
      security:
        - BearerAuth: []
      parameters:
        - name: relation
          in: query
          required: true
          schema:
            type: string
            enum: [OWNED, COLLABORATED, ARCHIVED]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Skill 分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/tags:
    get:
      tags: [Tags]
      summary: 获取 Tag 列表
      operationId: listTags
      security: []
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: Tag 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills:
    get:
      tags: [Skills]
      summary: 获取公开 Skill 列表
      operationId: listSkills
      security:
        - {}
        - BearerAuth: []
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: tagId
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [UPDATED_DESC, CREATED_DESC, INSTALLS_DESC]
            default: UPDATED_DESC
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Skill 分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Skills]
      summary: 创建 Skill
      operationId: createSkill
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateSkillRequest'
            encoding:
              tagIds:
                style: form
                explode: true
              newTagNames:
                style: form
                explode: true
      responses:
        '201':
          description: Skill 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}:
    get:
      tags: [Skills]
      summary: 获取 Skill 详情
      description: 归档 Skill 仅对其 Owner、协作者和管理员返回完整详情。
      operationId: getSkill
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      responses:
        '200':
          description: Skill 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Skills]
      summary: 修改平台展示信息
      operationId: updateSkillMetadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillRequest'
      responses:
        '200':
          description: Skill 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions:
    get:
      tags: [Versions]
      summary: 获取版本历史
      operationId: listSkillVersions
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 版本分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Versions]
      summary: 发布新版本
      operationId: publishSkillVersion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PublishVersionRequest'
            encoding:
              tagIds:
                style: form
                explode: true
              newTagNames:
                style: form
                explode: true
      responses:
        '201':
          description: 新版本已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions/{versionId}:
    get:
      tags: [Versions]
      summary: 获取版本详情
      operationId: getSkillVersion
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 版本详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersionDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions/{versionId}/files:
    get:
      tags: [Versions]
      summary: 获取版本文件树
      operationId: listVersionFiles
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 文件清单
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileEntry'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions/{versionId}/files/content:
    get:
      tags: [Versions]
      summary: 获取文本文件内容
      operationId: getVersionFileContent
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/VersionId'
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文本文件内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContent'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions/{versionId}/withdraw:
    post:
      tags: [Versions]
      summary: 撤回版本
      operationId: withdrawSkillVersion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: 版本已撤回
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersion'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/archive:
    post:
      tags: [Skills]
      summary: 归档 Skill
      operationId: archiveSkill
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Skill 已归档
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/restore:
    post:
      tags: [Skills]
      summary: 恢复 Skill
      operationId: restoreSkill
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Skill 已恢复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/installation-status:
    get:
      tags: [Installations]
      summary: 查询已安装 Skill 的在线状态
      operationId: getInstallationStatus
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - name: versionId
          in: query
          required: false
          description: 本地安装凭证记录的版本 ID，用于判断该版本是否已撤回。
          schema:
            type: string
      responses:
        '200':
          description: 最小在线状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationStatus'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/ownership-transfers:
    post:
      tags: [Ownership]
      summary: 发起所有权转移邀请
      operationId: createOwnershipTransfer
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOwnershipTransferRequest'
      responses:
        '201':
          description: 邀请已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipTransfer'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/ownership-transfers/{transferId}/accept:
    post:
      tags: [Ownership]
      summary: 接受所有权转移
      operationId: acceptOwnershipTransfer
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: 已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipTransfer'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/ownership-transfers/{transferId}/reject:
    post:
      tags: [Ownership]
      summary: 拒绝所有权转移
      operationId: rejectOwnershipTransfer
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: 已拒绝
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipTransfer'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/ownership-transfers/{transferId}/cancel:
    post:
      tags: [Ownership]
      summary: 取消所有权转移
      operationId: cancelOwnershipTransfer
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: 已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipTransfer'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/skills/{skillId}/versions/{versionId}/download-tickets:
    post:
      tags: [Installations]
      summary: 获取版本下载凭证
      operationId: createDownloadTicket
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '201':
          description: 下载凭证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTicket'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/installations/resolve:
    post:
      tags: [Installations]
      summary: 通过名称和内容哈希恢复平台关联
      operationId: resolveInstallation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveInstallationRequest'
      responses:
        '200':
          description: 匹配结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationResolution'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/installations/events:
    post:
      tags: [Installations]
      summary: 上报成功安装事件
      operationId: createInstallationEvent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallationEventRequest'
      responses:
        '204':
          description: 已记录或幂等接受
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/notifications:
    get:
      tags: [Notifications]
      summary: 获取通知
      operationId: listNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 通知分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/notifications/read-all:
    post:
      tags: [Notifications]
      summary: 全部标记已读
      operationId: readAllNotifications
      security:
        - BearerAuth: []
      responses:
        '204':
          description: 已全部标记已读
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      summary: 标记单条通知已读
      operationId: readNotification
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 已标记已读
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SkillId:
      name: skillId
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
    TransferId:
      name: transferId
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    ErrorResponse:
      description: 请求失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - COLLABORATOR_REQUIRED
            - CONTENT_UNCHANGED
            - DISPLAY_NAME_CONFIRMATION_REQUIRED
            - DUPLICATE_SKILL_NAME
            - FILE_NOT_FOUND
            - FILE_PREVIEW_UNAVAILABLE
            - FORBIDDEN
            - INITIAL_VERSION_REQUIRED
            - INSTALLATION_UNAVAILABLE
            - INVALID_REQUEST
            - INVALID_SEMVER
            - INVALID_SKILL_PACKAGE
            - OWNER_REQUIRED
            - PACKAGE_HASH_MISMATCH
            - PACKAGE_TOO_LARGE
            - SKILL_NAME_MISMATCH
            - SKILL_NOT_FOUND
            - SKILL_UNAVAILABLE
            - TRANSFER_NOT_FOUND
            - TRANSFER_RESOLVED
            - UNAUTHENTICATED
            - USER_DISABLED
            - VERSION_ALREADY_EXISTS
            - VERSION_CONFLICT
            - VERSION_NOT_FOUND
            - VERSION_NOT_GREATER
        message:
          type: string
        details:
          type: [object, 'null']
          additionalProperties: true
    User:
      type: object
      required: [id, name, avatarUrl, departmentPath, status, role, syncedAt]
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: [string, 'null']
          format: uri
        departmentPath:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        role:
          type: string
          enum: [USER, ADMIN]
        syncedAt:
          type: string
          format: date-time
    Tag:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 50
    DerivedSource:
      type: object
      required: [skillId, skillName, versionId, version, status, linkable]
      properties:
        skillId:
          type: string
        skillName:
          type: string
        versionId:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [ACTIVE, ARCHIVED, NAME_CONFLICT]
        linkable:
          type: boolean
    SkillVersion:
      type: object
      required:
        - id
        - skillId
        - version
        - status
        - skillName
        - skillDescription
        - changelog
        - baseVersionId
        - packageSize
        - packageSha256
        - contentHash
        - uploadedBy
        - publishedAt
        - withdrawnBy
        - withdrawnAt
        - withdrawalReason
      properties:
        id:
          type: string
        skillId:
          type: string
        version:
          type: string
          pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'
        status:
          type: string
          enum: [PUBLISHED, WITHDRAWN]
        skillName:
          type: string
          maxLength: 64
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        skillDescription:
          type: string
          minLength: 1
        changelog:
          type: string
          minLength: 1
          maxLength: 2000
        baseVersionId:
          type: [string, 'null']
        packageSize:
          type: integer
          minimum: 1
          maximum: 52428800
        packageSha256:
          type: string
        contentHash:
          type: string
        uploadedBy:
          $ref: '#/components/schemas/User'
        publishedAt:
          type: string
          format: date-time
        withdrawnBy:
          oneOf:
            - $ref: '#/components/schemas/User'
            - type: 'null'
        withdrawnAt:
          type: [string, 'null']
          format: date-time
        withdrawalReason:
          type: [string, 'null']
    SkillVersionDetail:
      allOf:
        - $ref: '#/components/schemas/SkillVersion'
        - type: object
          required: [skillMd]
          properties:
            skillMd:
              type: string
    SkillSummary:
      type: object
      required:
        - id
        - skillName
        - displayName
        - skillDescription
        - displayDescription
        - status
        - owner
        - tags
        - currentVersion
        - installCount
        - derivedFrom
        - updatedBy
        - archivedAt
        - archiveReason
        - nameConflictReason
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        skillName:
          type: string
          maxLength: 64
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        skillDescription:
          type: string
          minLength: 1
        displayDescription:
          type: string
          minLength: 1
          maxLength: 1000
        status:
          type: string
          enum: [ACTIVE, ARCHIVED, NAME_CONFLICT]
        owner:
          $ref: '#/components/schemas/User'
        tags:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/Tag'
        currentVersion:
          $ref: '#/components/schemas/SkillVersion'
        installCount:
          type: integer
          minimum: 0
        derivedFrom:
          oneOf:
            - $ref: '#/components/schemas/DerivedSource'
            - type: 'null'
        updatedBy:
          $ref: '#/components/schemas/User'
        archivedAt:
          type: [string, 'null']
          format: date-time
        archiveReason:
          type: [string, 'null']
        nameConflictReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SkillDetail:
      allOf:
        - $ref: '#/components/schemas/SkillSummary'
        - type: object
          required: [collaborators, derivedChain]
          properties:
            collaborators:
              type: array
              items:
                $ref: '#/components/schemas/User'
            derivedChain:
              type: array
              items:
                $ref: '#/components/schemas/DerivedSource'
    FileEntry:
      type: object
      required: [path, type, size, sha256, previewable]
      properties:
        path:
          type: string
        type:
          type: string
          enum: [FILE, DIRECTORY]
        size:
          type: [integer, 'null']
          minimum: 0
        sha256:
          type: [string, 'null']
        previewable:
          type: boolean
    FileContent:
      type: object
      required: [path, content, sha256]
      properties:
        path:
          type: string
        content:
          type: string
        sha256:
          type: string
    CreateSkillRequest:
      type: object
      required: [file, displayName, displayDescription]
      properties:
        file:
          type: string
          format: binary
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        displayDescription:
          type: string
          minLength: 1
          maxLength: 1000
        tagIds:
          type: array
          maxItems: 5
          items:
            type: string
        newTagNames:
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 50
        forkedFromSkillId:
          type: string
        forkedFromVersionId:
          type: string
        confirmDuplicateDisplayName:
          type: boolean
          default: false
      dependentRequired:
        forkedFromSkillId: [forkedFromVersionId]
        forkedFromVersionId: [forkedFromSkillId]
    PublishVersionRequest:
      type: object
      required: [file, baseVersionId, version, changelog]
      properties:
        file:
          type: string
          format: binary
        baseVersionId:
          type: string
        version:
          type: string
          pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'
        changelog:
          type: string
          minLength: 1
          maxLength: 2000
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        displayDescription:
          type: string
          minLength: 1
          maxLength: 1000
        tagIds:
          type: array
          maxItems: 5
          items:
            type: string
        newTagNames:
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 50
        confirmDuplicateDisplayName:
          type: boolean
          default: false
    UpdateSkillRequest:
      type: object
      minProperties: 1
      anyOf:
        - required: [displayName]
        - required: [displayDescription]
        - required: [tagIds]
        - required: [newTagNames]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        displayDescription:
          type: string
          minLength: 1
          maxLength: 1000
        tagIds:
          type: array
          maxItems: 5
          items:
            type: string
        newTagNames:
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 50
        confirmDuplicateDisplayName:
          type: boolean
          default: false
    ReasonRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    CreateOwnershipTransferRequest:
      type: object
      required: [targetUserId]
      properties:
        targetUserId:
          type: string
        reason:
          type: [string, 'null']
          maxLength: 1000
    OwnershipTransfer:
      type: object
      required: [id, skillId, fromOwner, targetUser, status, reason, createdBy, createdAt, expiresAt, resolvedAt]
      properties:
        id:
          type: string
        skillId:
          type: string
        fromOwner:
          $ref: '#/components/schemas/User'
        targetUser:
          $ref: '#/components/schemas/User'
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED, CANCELED, EXPIRED]
        reason:
          type: [string, 'null']
        createdBy:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, 'null']
          format: date-time
    InstallationStatus:
      type: object
      required: [skillId, status, archivedAt, archiveReason, nameConflictReason, versionStatus, withdrawalReason, recommendedVersion]
      properties:
        skillId:
          type: string
        status:
          type: string
          enum: [ACTIVE, ARCHIVED, NAME_CONFLICT]
        archivedAt:
          type: [string, 'null']
          format: date-time
        archiveReason:
          type: [string, 'null']
        nameConflictReason:
          type: [string, 'null']
        versionStatus:
          type: [string, 'null']
          enum: [PUBLISHED, WITHDRAWN, null]
        withdrawalReason:
          type: [string, 'null']
        recommendedVersion:
          oneOf:
            - type: object
              required: [id, version]
              properties:
                id:
                  type: string
                version:
                  type: string
            - type: 'null'
    DownloadTicket:
      type: object
      required: [url, expiresAt, packageSha256, contentHash]
      properties:
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        packageSha256:
          type: string
        contentHash:
          type: string
    ResolveInstallationRequest:
      type: object
      required: [skillName, contentHash]
      properties:
        skillName:
          type: string
        contentHash:
          type: string
    InstallationResolution:
      type: object
      required: [matched, skillId, versionId, status, archivedAt, archiveReason]
      properties:
        matched:
          type: boolean
        skillId:
          type: [string, 'null']
        versionId:
          type: [string, 'null']
        status:
          type: [string, 'null']
          enum: [ACTIVE, ARCHIVED, NAME_CONFLICT, null]
        archivedAt:
          type: [string, 'null']
          format: date-time
        archiveReason:
          type: [string, 'null']
    InstallationEventRequest:
      type: object
      required: [eventId, skillId, versionId, installedAt]
      properties:
        eventId:
          type: string
        skillId:
          type: string
        versionId:
          type: string
        installedAt:
          type: string
          format: date-time
    Notification:
      type: object
      required: [id, type, title, body, skillId, readAt, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [VERSION_PUBLISHED, METADATA_UPDATED, OWNERSHIP_TRANSFER, SKILL_STATUS_CHANGED]
        title:
          type: string
        body:
          type: string
        skillId:
          type: [string, 'null']
        readAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
    SkillPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SkillSummary'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    VersionPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SkillVersion'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    NotificationPage:
      type: object
      required: [items, page, pageSize, total, unreadCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        unreadCount:
          type: integer
          minimum: 0
